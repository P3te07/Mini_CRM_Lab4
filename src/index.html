<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini CRM Modificat de P3te07 la ora 20:26, Re-schimbat la 20:42</title>
    <link rel="stylesheet" href="style.css" />
    <script src="data.js" defer></script>
    <script src="app.js" defer></script>
</head>

<body>
    <div class="sidebar">
        <div class="logo">Mini CRM</div>
        <nav>
            <a href="#" class="nav-link active">Clienți</a>
            <a href="#" class="nav-link">Dashboard</a>
        </nav>
    </div>

    <div class="main">
        <div class="topbar">
            <h2>Gestionare Clienți</h2>
            <button id="addClientBtn">+ Client Nou</button>
        </div>
        <div class="stats">
            <div class="stat-card">
                <span id="totalCount">0</span>
                <label>Total Clienți</label>
            </div>
            <div class="stat-card green">
                <span id="activeCount">0</span>
                <label>Activi</label>
            </div>
            <div class="stat-card blue">
                <span id="leadCount">0</span>
                <label>Leads</label>
            </div>
            <div class="stat-card gray">
                <span id="inactiveCount">0</span>
                <label>Inactivi</label>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="searchInput" placeholder="Caută după nume sau email..." />
            <select id="filterStatus">
                <option value="all">Toate statusurile</option>
                <option value="Lead">Lead</option>
                <option value="Activ">Activ</option>
                <option value="Inactiv">Inactiv</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nume</th>
                        <th>Email</th>
                        <th>Telefon</th>
                        <th>Companie</th>
                        <th>Status</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="clientTable"></tbody>
            </table>
            <p id="emptyMsg" class="empty-msg">Niciun client găsit. Adaugă primul client! 🚀</p>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-box">
            <h3 id="modalTitle">Client Nou</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nume *</label>
                    <input type="text" id="fName" placeholder="Ion Popescu" />
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="fEmail" placeholder="ion@example.com" />
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="text" id="fPhone" placeholder="07xx xxx xxx" />
                </div>
                <div class="form-group">
                    <label>Companie</label>
                    <input type="text" id="fCompany" placeholder="Firma SRL" />
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="fStatus">
                        <option value="Lead">Lead</option>
                        <option value="Activ">Activ</option>
                        <option value="Inactiv">Inactiv</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notițe</label>
                    <input type="text" id="fNotes" placeholder="Observații..." />
                </div>
            </div>
            <p id="formError" class="error hidden">Completați câmpurile obligatorii!</p>
            <div class="modal-actions">
                <button id="cancelBtn" class="btn-cancel">Anulează</button>
                <button id="saveBtn" class="btn-save">Salvează</button>
            </div>
        </div>
    </div>
</body>

</html>
